.pytest_template: &pytest_template
  image: "${CI_REGISTRY_IMAGE}:${VERSION}_${py_version}"
  # cache:
  #   paths:
  #     - .venv
  #   policy: pull
  #   key: ${CI_COMMIT_REF_SLUG}_${py_version}
  tags:
    - ${RUNNER}
  needs: ["sphinx-job"] # , "prefetch-artifacts"]
  before_script:
    # - poetry config virtualenvs.in-project true
    # - poetry config virtualenvs.create false
    # - poetry config virtualenvs.create false
    - export REPLAY_SPARK_CORE_COUNT=4
    - export REPLAY_SPARK_MEMORY=16
    - *wrapper_install
  parallel:
    matrix:
      - py_version:
        - "py310"
        - "py311"
        - "py312"

pytest-core:
  <<: *pytest_template
  stage: test_core
  script:
    - *activate_poetry
    - poetry run pytest -m core tests/ --ignore=tests/experimental --ignore=tests/conditional
    - mv .coverage .coverage_core_${py_version}
  artifacts:
    paths:
      - .coverage_core_${py_version}
    expire_in: 1 day

pytest-conditional:
  <<: *pytest_template
  stage: test_conditional
  variables:
    WRAPPER_ARGS: --experimental
  script:
    - *install_conditionals
    - *activate_poetry
    - poetry run pytest -m conditional tests/ --ignore=tests/experimental
    - mv .coverage .coverage_conditional_${py_version}
  artifacts:
    paths:
      - .coverage_conditional_${py_version}
    expire_in: 1 day

pytest-torch:
  <<: *pytest_template
  stage: test_torch
  variables:
    WRAPPER_EXTRAS: -E torch-cpu
  script:
    - *activate_poetry
    - |
      poetry run pytest \
        -m "not spark and not experimental and not conditional" \
        tests/ \
        --ignore=tests/experimental \
        --ignore=tests/conditional
    - mv .coverage .coverage_torch_${py_version}
  artifacts:
    paths:
      - .coverage_torch_${py_version}
    expire_in: 1 day

pytest-spark:
  <<: *pytest_template
  stage: test_spark
  variables:
    WRAPPER_EXTRAS: -E spark
  script:
    - *activate_poetry
    - |
      poetry run pytest \
        -m "not torch and not experimental and not conditional" \
        tests/ \
        --ignore=tests/experimental \
        --ignore=tests/models \
        --ignore=tests/conditional
    - mv .coverage .coverage_spark_${py_version}
  artifacts:
    paths:
      - .coverage_spark_${py_version}
    expire_in: 1 day

pytest-spark-and-torch:
  <<: *pytest_template
  stage: test_spark_torch
  variables:
    WRAPPER_EXTRAS: -E torch-cpu -E spark
  script:
    - *activate_poetry
    - |
      poetry run pytest \
        -m "not experimental and not conditional" \
        --ignore=replay/models/nn/sequential/compiled \
        --ignore=replay/experimental \
        --ignore=tests/experimental \
        --ignore=tests/models \
        --ignore=tests/conditional
    - mv .coverage .coverage_spark_and_torch_${py_version}
  artifacts:
    paths:
      - .coverage_spark_and_torch_${py_version}
    expire_in: 1 day

pytest-models:
  <<: *pytest_template
  stage: test_models
  variables:
    WRAPPER_EXTRAS: -E torch-cpu -E spark
  script:
    - *activate_poetry
    - |
      poetry run pytest \
        -m "not experimental and not conditional" \
        tests/models \
        --ignore=replay/experimental \
        --ignore=tests/experimental \
        --ignore=tests/conditional
    - mv .coverage .coverage_models_${py_version}
  artifacts:
    paths:
      - .coverage_models_${py_version}
    expire_in: 1 day

pytest-experimental:
  <<: *pytest_template
  parallel:
    matrix:
      - py_version:
        - "py310"
        - "py311"
        # - "py312" # TODO: uncomment after fix of python CMake issue 
            # (https://github.com/scikit-build/cmake-python-distributions/issues/692)
  stage: test_experimental
  variables:
    WRAPPER_ARGS: --experimental
  script:
    - *install_conditionals
    - *activate_poetry
    - poetry run pytest -m "experimental"
    - mv .coverage .coverage_experimental_${py_version}
  artifacts:
    paths:
      - .coverage_experimental_${py_version}
    expire_in: 1 day

.merge-coverage-template: &merge-coverage-template
  stage: merge coverage
  # cache:
  #   <<: *global_cache
  #   key: ${CI_COMMIT_REF_SLUG}_${py_version}
  variables: 
    WRAPPER_EXTRAS: --only dev
  before_script:
    - *wrapper_install
  script:
    - *activate_poetry
    - |
      poetry run coverage combine \
        .coverage_core_${py_version} \
        .coverage_conditional_${py_version} \
        .coverage_spark_${py_version} \
        .coverage_torch_${py_version} \
        .coverage_spark_and_torch_${py_version} \
        .coverage_models_${py_version} \
        .coverage_experimental_${py_version}
    - poetry run coverage xml
    - poetry run coverage report -m --fail-under=100
  tags:
    - ${RUNNER}
  image: "${CI_REGISTRY_IMAGE}:${VERSION}_${py_version}"
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    paths:
      - coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

merge-coverage-py310:
  <<: *merge-coverage-template
  variables:
    py_version: py310
  needs:
    - "pytest-core: [py310]"
    - "pytest-conditional: [py310]"
    - "pytest-torch: [py310]"
    - "pytest-spark: [py310]"
    - "pytest-spark-and-torch: [py310]"
    - "pytest-models: [py310]"
    - "pytest-experimental: [py310]"

merge-coverage-py311:
  <<: *merge-coverage-template
  variables:
    py_version: py311
  needs:
    - "pytest-core: [py311]"
    - "pytest-conditional: [py311]"
    - "pytest-torch: [py311]"
    - "pytest-spark: [py311]"
    - "pytest-spark-and-torch: [py311]"
    - "pytest-models: [py311]"
    - "pytest-experimental: [py311]"

