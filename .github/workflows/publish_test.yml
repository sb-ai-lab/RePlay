name: Publish to test PyPI

on: 
  workflow_dispatch:

jobs:
  
  publish_test:
    runs-on: ubuntu-latest
    permissions:
        id-token: write
    environment:
        name: testpypi
        url: https://test.pypi.org/p/replay-rec

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install full package
        run: |
          curl -LsSf https://astral.sh/uv/0.10.7/install.sh | sh
          uv pip install --system --no-cache --upgrade pip wheel
          uv cache prune --ci
          ./uv_wrapper.sh sync --group dev

      - name: Build
        run: |
          export PACKAGE_SUFFIX=.preview
          echo $PACKAGE_SUFFIX
          ./uv_wrapper.sh build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with: 
          repository-url: https://test.pypi.org/legacy/
