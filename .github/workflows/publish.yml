name: Publish to PyPI

on: 
  push:
    branches: [release]
    tags:
      - 'v*.*.*'

jobs:
  publish_experimental:
    runs-on: ubuntu-latest
    permissions:
        id-token: write
    environment:
        name: release
        url: https://pypi.org/p/replay-rec

    steps:
      - uses: ./.github/actions/ci-setup

      - name: Install experimental package
        run: uv sync --no-cache

      - name: Build Experimental
        run: |
          export PACKAGE_SUFFIX=.preview
          uv build

      - name: Publish Experimental
        uses: pypa/gh-action-pypi-publish@release/v1

  publish_production:
    runs-on: ubuntu-latest
    permissions:
        id-token: write
    environment:
        name: release
        url: https://pypi.org/p/replay-rec

    steps:
      - uses: ./.github/actions/ci-setup

      - name: Install production package
        run: uv sync --no-cache --extra torch --extra spark

      - name: Build Production
        run: |
          uv build

      - name: Publish Production
        uses: pypa/gh-action-pypi-publish@release/v1
