name: Publish to PyPI

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - release
  workflow_dispatch:

jobs:
  check_tag:
    name: Check release tag
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.check.outputs.publish }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
        ref: ${{ github.event.workflow_run.head_sha }}
        fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Check workflow result and v* tag
        id: check
        shell: bash
        run: |
          set -euo pipefail

          echo "publish=false" >> "$GITHUB_OUTPUT"
          echo "tag=" >> "$GITHUB_OUTPUT"

          # publish only after successful CI
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
          echo "CI was not successful"
          exit 0
          fi

          # find v* tag on tested commit
          TAG="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep '^v' | head -n1 || true)"

          if [ -z "$TAG" ]; then
          echo "No v* tag on tested commit"
          exit 0
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag found: $TAG"

  # run: |
  #   TAG="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep '^v' | head -n1 || true)"

  #   if [ -z "$TAG" ]; then
  #   echo "has_tag=false" >> "$GITHUB_OUTPUT"
  #   else
  #   echo "has_tag=true" >> "$GITHUB_OUTPUT"
  #   echo "tag=$TAG" >> "$GITHUB_OUTPUT"
  #   echo "Found tag: $TAG"
  #   fi

  #   - name: Set up Python
  #   if: steps.tag_check.outputs.has_tag == 'true'
  #   uses: actions/setup-python@v5
  #   with:
  #   python-version: '3.12'

  publish_experimental:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
        id-token: write
    environment:
        name: release
        url: https://pypi.org/p/replay-rec

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install experimental package
        run: |
          pip install --upgrade pip wheel poetry==2.2.1 poetry-dynamic-versioning --no-cache-dir
          ./poetry_wrapper.sh --experimental --generate
          eval $(poetry env activate)
          poetry cache clear PyPI --all
          poetry sync --no-cache

      - name: Build Experimental
        run: |
          export PACKAGE_SUFFIX=.preview
          poetry build

      - name: Publish Experimental
        uses: pypa/gh-action-pypi-publish@release/v1

  publish_production:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
        id-token: write
    environment:
        name: release
        url: https://pypi.org/p/replay-rec

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install production package
        run: |
          pip install --upgrade pip wheel poetry==2.2.1 poetry-dynamic-versioning --no-cache-dir
          ./poetry_wrapper.sh --generate
          eval $(poetry env activate)
          poetry cache clear PyPI --all
          poetry sync -E torch -E spark --no-cache

      - name: Build Production
        run: |
          poetry build

      - name: Publish Production
        uses: pypa/gh-action-pypi-publish@release/v1
