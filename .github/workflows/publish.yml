name: Publish to PyPI

on: 
  push:
    branches: [release]
    tags:
      - 'v*.*.*'

jobs:
  publish_experimental:
    runs-on: ubuntu-latest
    permissions:
        id-token: write
    environment:
        name: release
        url: https://pypi.org/p/replay-rec

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install experimental package
        run: |
          curl -LsSf https://astral.sh/uv/0.10.7/install.sh | sh
          uv pip install --system --no-cache --upgrade pip wheel
          uv cache prune --ci
          uv sync --no-cache

      - name: Build Experimental
        run: |
          export PACKAGE_SUFFIX=.preview
          uv build

      - name: Publish Experimental
        uses: pypa/gh-action-pypi-publish@release/v1

  publish_production:
    runs-on: ubuntu-latest
    permissions:
        id-token: write
    environment:
        name: release
        url: https://pypi.org/p/replay-rec

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install production package
        run: |
          curl -LsSf https://astral.sh/uv/0.10.7/install.sh | sh
          uv pip install --system --no-cache --upgrade pip wheel
          uv cache prune --ci
          uv sync --no-cache --extra torch --extra spark

      - name: Build Production
        run: |
          uv build

      - name: Publish Production
        uses: pypa/gh-action-pypi-publish@release/v1
