name: Deploy Docs to Pages

# Run deploy only on release branch after finished CI 
on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: ['release/**']
  
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check_tag:
    if : ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/check_release_tag.yml
    with:
      sha: ${{ github.event.workflow_run.head_sha }}

  deploy_docs:
    needs: check_tag
    if: needs.check_tag.outputs.has_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: ci_setup
        uses: ./.github/actions/ci-setup
        with:
          python-version: "3.10"
      - name: clear_poetry_cache
        run: poetry cache clear PyPI --all
      - name: install_experimental_dev_dependencies
        uses: ./.github/actions/install-poetry-deps
        with:
          experimental: "true"
          with-dev: "true"
      - name: install_conditionals
        uses: ./.github/actions/install-conditionals
      - name: build_docs
        run: |
          eval "$(poetry env activate)"
          make -C docs clean html

      - name: setup_pages
        uses: actions/configure-pages@v6

      - name: upload_artifact
        uses: actions/upload-pages-artifact@v6
        with:
          path: 'docs/_build/html/'
          
      - name: deploy_to_github_pages
        id: deployment
        uses: actions/deploy-pages@v4
